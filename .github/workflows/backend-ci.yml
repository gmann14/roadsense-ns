name: Backend CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "supabase/**"
      - "scripts/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "supabase/**"
      - "scripts/**"
      - ".github/workflows/backend-ci.yml"

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-check:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify backend scaffold exists
        run: |
          test -d supabase/migrations
          test -d supabase/functions
          test -d supabase/tests
          test -d scripts
          test -f supabase/README.md

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.78.1

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Write local Edge Function secrets
        run: |
          cat > supabase/functions/.env <<'EOF'
          TOKEN_PEPPER=ci-local-pepper
          EOF

      - name: Start local Supabase stack
        run: supabase start

      - name: Apply migrations
        run: supabase db reset

      - name: Run database tests
        run: supabase test db

      - name: Run Edge Function tests
        run: |
          mapfile -t test_files < <(find supabase/functions -type f -name '*_test.ts' | sort)
          if [ "${#test_files[@]}" -eq 0 ]; then
            echo "No Deno tests found."
            exit 0
          fi
          deno test -A "${test_files[@]}"

      - name: Run API smoke scripts
        shell: bash
        run: |
          eval "$(supabase status -o env)"
          export FUNCTIONS_BASE_URL="${API_URL}/functions/v1"
          export SUPABASE_ANON_KEY="${ANON_KEY}"
          export DATABASE_URL="${DB_URL}"
          bash -n ./scripts/api-smoke.sh
          bash -n ./scripts/seeded-e2e-smoke.sh
          ./scripts/api-smoke.sh
          ./scripts/seeded-e2e-smoke.sh

      - name: Report scaffold status
        run: |
          migration_count="$(find supabase/migrations -maxdepth 1 -type f ! -name 'README.md' | wc -l | tr -d ' ')"
          function_count="$(find supabase/functions -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')"
          echo "Migrations: ${migration_count}"
          echo "Function directories: ${function_count}"
