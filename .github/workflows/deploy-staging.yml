name: Deploy Staging

on:
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    environment: staging
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_TOKEN_PEPPER: ${{ secrets.SUPABASE_TOKEN_PEPPER }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      OSM_SNAPSHOT_URL: ${{ secrets.OSM_SNAPSHOT_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required staging secrets
        id: precheck
        shell: bash
        run: |
          if [[ -z "${SUPABASE_ACCESS_TOKEN}" || -z "${PROJECT_REF}" || -z "${SUPABASE_DB_PASSWORD}" || -z "${SUPABASE_ANON_KEY}" || -z "${SUPABASE_TOKEN_PEPPER}" ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Hosted staging is not configured yet; skipping deploy."
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Install postgres client
        if: steps.precheck.outputs.ready == 'true'
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Set up Supabase CLI
        if: steps.precheck.outputs.ready == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: 2.78.1

      - name: Set up Deno
        if: steps.precheck.outputs.ready == 'true'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Link project
        if: steps.precheck.outputs.ready == 'true'
        run: supabase link --project-ref "${PROJECT_REF}" -p "${SUPABASE_DB_PASSWORD}"

      - name: Push database migrations
        if: steps.precheck.outputs.ready == 'true'
        run: supabase db push -p "${SUPABASE_DB_PASSWORD}"

      - name: Sync function secrets
        if: steps.precheck.outputs.ready == 'true'
        shell: bash
        run: |
          secrets_file="$(mktemp)"
          trap 'rm -f "${secrets_file}"' EXIT
          {
            printf 'TOKEN_PEPPER=%s\n' "${SUPABASE_TOKEN_PEPPER}"
            if [[ -n "${SENTRY_DSN}" ]]; then
              printf 'SENTRY_DSN=%s\n' "${SENTRY_DSN}"
            fi
            if [[ -n "${OSM_SNAPSHOT_URL}" ]]; then
              printf 'OSM_SNAPSHOT_URL=%s\n' "${OSM_SNAPSHOT_URL}"
            fi
          } > "${secrets_file}"
          supabase secrets set --project-ref "${PROJECT_REF}" --env-file "${secrets_file}"

      - name: Deploy Edge Functions
        if: steps.precheck.outputs.ready == 'true'
        shell: bash
        run: |
          while IFS= read -r function_name; do
            supabase functions deploy "${function_name}" --project-ref "${PROJECT_REF}" --use-api
          done < <(find supabase/functions -mindepth 1 -maxdepth 1 -type d ! -name '_shared' -exec basename {} \; | sort)

      - name: Run staging smoke checks
        if: steps.precheck.outputs.ready == 'true'
        shell: bash
        run: |
          export FUNCTIONS_BASE_URL="https://${PROJECT_REF}.supabase.co/functions/v1"
          encoded_password="$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["SUPABASE_DB_PASSWORD"], safe=""))')"
          export DATABASE_URL="postgresql://postgres:${encoded_password}@db.${PROJECT_REF}.supabase.co:5432/postgres?sslmode=require"
          bash -n ./scripts/api-smoke.sh
          bash -n ./scripts/seeded-e2e-smoke.sh
          ./scripts/api-smoke.sh
          ./scripts/seeded-e2e-smoke.sh
