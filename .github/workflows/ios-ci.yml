name: iOS CI

on:
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scaffold-check:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify iOS scaffold exists
        shell: bash
        run: |
          test -d ios
          test -f ios/README.md
          test -f ios/Package.swift
          test -f ios/project.yml
          test -f ios/Config/RoadSenseNS.Local.xcconfig
          test -f ios/Config/RoadSenseNS.Staging.xcconfig
          test -f ios/Config/RoadSenseNS.Production.xcconfig
          test -d ios/Sources/RoadSenseNSBootstrap
          test -d ios/RoadSenseNS
          test -d ios/Config/Templates

      - name: Run bootstrap Swift tests
        shell: bash
        run: |
          cd ios
          xcrun swift test

      - name: Install XcodeGen
        shell: bash
        run: brew list xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Show Xcode version
        shell: bash
        run: xcodebuild -version

      - name: Generate Xcode project
        shell: bash
        run: |
          cd ios
          xcodegen generate

      - name: Verify Xcode entrypoint shape
        shell: bash
        run: |
          if find ios -maxdepth 2 \( -name "*.xcodeproj" -o -name "*.xcworkspace" \) | grep -q .; then
            echo "Found Xcode project/workspace."
          else
            echo "Expected generated Xcode project/workspace, but none was found."
            exit 1
          fi

      - name: Run full simulator test suite
        shell: bash
        run: |
          cd ios
          xcodebuild test \
            -project RoadSenseNS.xcodeproj \
            -scheme RoadSenseNS \
            -configuration "Local Debug" \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ENABLE_PREVIEWS=NO
