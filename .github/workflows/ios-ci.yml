name: iOS CI

on:
  workflow_dispatch:

jobs:
  scaffold-check:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: CI mode note
        run: echo "Manual-only for now to avoid burning GitHub macOS minutes during early scaffolding."

      - name: Verify iOS scaffold exists
        shell: bash
        run: |
          test -d ios
          test -f ios/README.md
          test -f ios/Package.swift
          test -f ios/project.yml
          test -f ios/Config/RoadSenseNS.Local.xcconfig
          test -f ios/Config/RoadSenseNS.Staging.xcconfig
          test -f ios/Config/RoadSenseNS.Production.xcconfig
          test -d ios/Sources/RoadSenseNSBootstrap
          test -d ios/RoadSenseNS
          test -d ios/Config/Templates

      - name: Run bootstrap Swift tests
        shell: bash
        run: |
          cd ios
          swift test

      - name: Install XcodeGen
        shell: bash
        run: brew install xcodegen

      - name: Generate Xcode project
        shell: bash
        run: |
          cd ios
          xcodegen generate

      - name: Verify Xcode entrypoint shape
        shell: bash
        run: |
          if find ios -maxdepth 2 \( -name "*.xcodeproj" -o -name "*.xcworkspace" \) | grep -q .; then
            echo "Found Xcode project/workspace."
          else
            echo "Expected generated Xcode project/workspace, but none was found."
            exit 1
          fi

      - name: Build for testing
        shell: bash
        run: |
          cd ios
          xcodebuild build-for-testing \
            -project RoadSenseNS.xcodeproj \
            -scheme RoadSenseNS \
            -configuration "Local Debug" \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ENABLE_PREVIEWS=NO
