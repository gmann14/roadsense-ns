name: iOS CI

on:
  workflow_dispatch:

jobs:
  scaffold-check:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: CI mode note
        run: echo "Manual-only for now to avoid burning GitHub macOS minutes during early scaffolding."

      - name: Verify iOS scaffold exists
        shell: bash
        run: |
          test -d ios
          test -f ios/README.md

      - name: Verify future Xcode entrypoint shape
        shell: bash
        run: |
          if find ios -maxdepth 2 \( -name "*.xcodeproj" -o -name "*.xcworkspace" \) | grep -q .; then
            echo "Found Xcode project/workspace."
          else
            echo "No Xcode project yet. Scaffold phase only."
          fi
