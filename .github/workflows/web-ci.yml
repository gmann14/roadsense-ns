name: Web CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ci.yml"

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web-check:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test

      - name: Build Next app
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:54321/functions/v1
        run: npm run build

      - name: Run Lighthouse trust-page checks
        run: npm run test:lighthouse

      - name: Run browser smoke tests
        run: npm run test:e2e
