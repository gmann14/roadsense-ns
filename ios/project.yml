name: RoadSenseNS
options:
  bundleIdPrefix: ca.roadsense
  deploymentTarget:
    iOS: "17.0"
packages:
  MapboxMaps:
    url: https://github.com/mapbox/mapbox-maps-ios.git
    from: 11.22.0
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa.git
    from: 8.21.0
configs:
  Local Debug: debug
  Staging Debug: debug
  Production Release: release
configFiles:
  Local Debug: Config/RoadSenseNS.Local.xcconfig
  Staging Debug: Config/RoadSenseNS.Staging.xcconfig
  Production Release: Config/RoadSenseNS.Production.xcconfig
settings:
  base:
    PRODUCT_NAME: RoadSense NS
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 5.9
    INFOPLIST_FILE: RoadSenseNS/Resources/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: ca.roadsense.ios
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
schemes:
  RoadSenseNS:
    build:
      targets:
        RoadSenseNS: all
        RoadSenseNSTests: [test]
        RoadSenseNSUITests: [test]
    test:
      gatherCoverageData: false
      targets:
        - name: RoadSenseNSTests
        - name: RoadSenseNSUITests
targets:
  RoadSenseNS:
    type: application
    platform: iOS
    sources:
      - path: RoadSenseNS
      - path: Sources/RoadSenseNSBootstrap
    resources:
      - path: RoadSenseNS/Resources
        excludes:
          - Info.plist
    dependencies:
      - package: MapboxMaps
      - package: Sentry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ca.roadsense.ios
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: RoadSense NS uses your location to measure road quality while you drive.
        INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: RoadSense NS uses background location to keep collecting road quality readings during a drive.
        INFOPLIST_KEY_NSMotionUsageDescription: RoadSense NS uses motion data to score road roughness and detect potholes.
        INFOPLIST_KEY_NSCameraUsageDescription: RoadSense NS uses the camera so you can submit pothole photos while stopped.
        INFOPLIST_KEY_UIBackgroundModes:
          - location
          - processing
          - fetch
        INFOPLIST_KEY_BGTaskSchedulerPermittedIdentifiers:
          - ca.roadsense.ios.nightly-cleanup
          - ca.roadsense.ios.upload-drain
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited)
  RoadSenseNSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RoadSenseNSTests
    dependencies:
      - target: RoadSenseNS
    settings:
      base:
        PRODUCT_NAME: RoadSenseNSTests
        PRODUCT_MODULE_NAME: RoadSenseNSTests
        PRODUCT_BUNDLE_IDENTIFIER: ca.roadsense.ios.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/RoadSense NS.app/RoadSense NS"
        BUNDLE_LOADER: "$(TEST_HOST)"
  RoadSenseNSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RoadSenseNSUITests
    dependencies:
      - target: RoadSenseNS
    settings:
      base:
        PRODUCT_NAME: RoadSenseNSUITests
        PRODUCT_MODULE_NAME: RoadSenseNSUITests
        PRODUCT_BUNDLE_IDENTIFIER: ca.roadsense.ios.uitests
  RoadSenseNSSimHarness:
    type: application
    platform: iOS
    sources:
      - path: RoadSenseNSSimHarness
      - path: Sources/RoadSenseNSBootstrap
    resources:
      - path: RoadSenseNSSimHarness/Fixtures
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ca.roadsense.ios.simharness
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
